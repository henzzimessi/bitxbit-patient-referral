name: CI

"on":
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file for compose
        run: |
          if [ ! -f .env.example ]; then
            echo ".env.example is missing"
            exit 1
          fi
          cp .env.example .env

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore solution
        run: dotnet restore ./PatientReferral.sln

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Start full stack (DB + init + API)
        run: docker compose up --build -d

      - name: Show compose status
        run: docker compose ps

      - name: Wait for DB init to complete successfully
        run: |
          for i in {1..90}; do
            status=$(docker inspect -f '{{.State.Status}}' patientreferral-sql-init 2>/dev/null || true)

            if [ "$status" = "exited" ]; then
              exit_code=$(docker inspect -f '{{.State.ExitCode}}' patientreferral-sql-init)
              if [ "$exit_code" = "0" ]; then
                echo "db-init completed successfully"
                exit 0
              fi

              echo "db-init failed with exit code $exit_code"
              docker logs patientreferral-sql-init
              exit 1
            fi

            echo "Waiting for db-init... ($i/90)"
            sleep 2
          done

          echo "Timed out waiting for db-init"
          docker logs patientreferral-sql-init
          exit 1

      - name: Wait for API to be healthy
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done
          echo "API did not become ready in time"
          exit 1

      - name: Smoke test DB-backed write endpoint
        run: |
          status_code=$(curl -sS -o /tmp/create_patient_response.json -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d '{"firstName":"CI","lastName":"Smoke","dateOfBirth":"1985-06-15"}' \
            http://localhost:8080/api/patients)

          if [ "$status_code" != "201" ]; then
            echo "Expected 201 from POST /api/patients, got $status_code"
            echo "Response body:"
            cat /tmp/create_patient_response.json || true
            echo "--- compose logs (api/db/db-init) ---"
            docker compose logs --no-color api db db-init
            exit 1
          fi

      - name: Run internal tests (unit + integration)
        run: dotnet test ./tests/PatientReferral.Tests/PatientReferral.Tests.csproj -c Release --no-restore --logger "console;verbosity=normal"

      - name: Run external E2E tests
        env:
          E2E_BASE_URL: http://localhost:8080
        run: dotnet test ./tests/PatientReferral.E2E.Tests/PatientReferral.E2E.Tests.csproj -c Release --no-restore --logger "console;verbosity=normal"

      - name: Collect compose logs on failure
        if: failure()
        run: docker compose logs --no-color > compose-logs.txt

      - name: Upload compose logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs.txt
          if-no-files-found: ignore

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shutdown compose
        if: always()
        run: docker compose down -v
