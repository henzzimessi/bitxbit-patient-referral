services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: patientreferral-sql
    ports:
      - "1433:1433"
    env_file:
      - ./.env
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA}
      - MSSQL_PID=${MSSQL_PID}
      - SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - mssql_data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: patientreferral-sql-init
    depends_on:
      - db
    env_file:
      - ./.env
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./sql:/sql:ro
      - ./sql/init.sh:/init.sh:ro
    command: ["/bin/bash", "/init.sh"]

  api:
    build:
      context: .
      dockerfile: src/PatientReferral.Api/Dockerfile
    container_name: patientreferral-api
    depends_on:
      - db
      - db-init
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
    ports:
      - "8080:8080"

volumes:
  mssql_data:
